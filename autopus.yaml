mode: full
project_name: N_ONE
platforms:
    - codex
    - gemini-cli
stack: go
language:
    comments: ko
    commits: ko
    ai_responses: ko
architecture:
    auto_generate: true
    enforce: true
    layers: []
lore:
    enabled: true
    auto_inject: false
    required_trailers:
        - Constraint
    stale_threshold_days: 90
spec:
    id_format: SPEC-{DOMAIN}-{NUMBER}
    ears_types:
        - ubiquitous
        - event-driven
        - unwanted
        - optional
        - complex
    review_gate:
        enabled: true
        strategy: debate
        providers: [codex, gemini]
        judge: codex
        max_revisions: 2
        auto_collect_context: true
        context_max_lines: 500
        verdict_threshold: 0.67
        doc_context_max_lines: 200
methodology:
    mode: tdd
    enforce: true
    review_gate: true
router:
    strategy: balanced
    tiers:
        local: ollama/qwen2.5:14b
        economy: gemini-3.1-pro-preview
        standard: gpt-5.4
        premium: gpt-5.4
    categories:
        deep: premium
        draft: local
        format: local
        git: economy
        quick: local
        ultrabrain: premium
        visual: premium
        writing: standard
    intent_gate: true
hooks:
    pre_commit_arch: true
    pre_commit_lore: true
    react_ci_failure: true
    react_review: true
session:
    handoff_enabled: true
    continue_file: .auto-continue.md
    max_context_tokens: 2000
orchestra:
    enabled: true
    default_strategy: consensus
    timeout_seconds: 300
    judge: codex
    providers:
        # claude:
        #     binary: claude
        #     args: [--print]
        #     pane_args: [--print]
        codex:
            binary: codex
            args: [exec, -m, gpt-5.4, --full-auto]
            pane_args: [-m, gpt-5.4]
        gemini:
            binary: gemini
            args: [-m, gemini-3.1-pro-preview, -p, ""]
            pane_args: [-m, gemini-3.1-pro-preview]
        ollama:
            binary: ollama
            args: [run, qwen2.5:14b]
            pane_args: [run, qwen2.5:14b]
            local: true
    commands:
        brainstorm:
            strategy: debate
            providers: [codex, gemini]
        plan:
            strategy: consensus
            providers: [codex, gemini]
        review:
            strategy: debate
            providers: [codex, gemini]
        secure:
            strategy: consensus
            providers: [codex, gemini]
quality:
    default: balanced
    presets:
        balanced:
            description: 핵심 분석은 Opus(Premium), 일반 작업은 Sonnet(Flash), 탐색/검증은 Haiku(Local). 최적 비용 세팅.
            agents:
                architect: opus
                debugger: sonnet
                devops: haiku
                executor: sonnet
                explorer: haiku
                planner: opus
                reviewer: sonnet
                security-auditor: opus
                spec-writer: sonnet
                tester: haiku
                validator: haiku
        ultra:
            description: 모든 에이전트를 Opus로 실행. 최고 품질.
            agents:
                architect: opus
                debugger: opus
                devops: opus
                executor: opus
                explorer: opus
                planner: opus
                reviewer: opus
                security-auditor: opus
                spec-writer: opus
                tester: opus
                validator: opus
skills:
    auto_activate: true
    max_active_skills: 5
    category_weights:
        agentic: 15
        quality: 20
        security: 30
        workflow: 10
verify:
    enabled: true
    default_viewport: desktop
    auto_fix: true
    max_fix_attempts: 2
context:
    signature_map: true
features:
    cc21:
        enabled: false
        task_created_mode: warn
        monitor_pattern_timeout_ms: 30000
usage_profile: fullstack
